<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="stylesheet" href="css/style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>treino foda</title>
</head>
<body>
    <main>
        <h1>Treino de crias do RS sobre js</h1>
        <label for="numero">
            Digite 10 números
        </label>
        <input type="number" name="numero" id="numero">
        <button id="btn-add">➕</button>
        <small id="txt-count">
            Restam 10 números
        </small>

        <label for="inseridos">
            Números inseridos
        </label>

        <select name="inseridos" id="inseridos">
            <option value="" id="opt1">Insira um número</option>
        </select>

        <button id="btn-apagar">🗑️</button>
        <ul>
            <li>Primeiro número inserido: <span id="primeiro"></span></li>
            <li>Último número inserido: <span id="ultimo"></span></li>
            <li>Soma de todos os números: <span id="soma"></span></li>
            <li>Maior número inserido: <span id="maior"></span></li>
            <li>Menor número inserido: <span id="menor"></span></li>
        </ul>

        <div id="box-btn">
            <button id="btn-finalizar" class="btn-class">Finalizar☠️</button>
            <button id="btn-reciclar" class="btn-class">Reciclar♻️</button>
        </div>
    </main>
    
    <script src="js/script.js"></script>
</body>
</html>
